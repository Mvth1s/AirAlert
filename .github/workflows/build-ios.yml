name: Build iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        run: pnpm build

      - name: Add iOS platform
        run: npx cap add ios

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ hashFiles('ios/App/CapApp-SPM/Package.resolved') }}
          restore-keys: spm-

      - name: Build archive (unsigned)
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -archivePath ${{ runner.temp }}/AirAlert.xcarchive \
            archive

      - name: Package IPA
        run: |
          APP=$(find ${{ runner.temp }}/AirAlert.xcarchive/Products -name "*.app" | head -1)
          mkdir -p /tmp/Payload
          cp -r "$APP" /tmp/Payload/
          cd /tmp && zip -r AirAlert.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirAlert-${{ github.sha }}
          path: /tmp/AirAlert.ipa
          retention-days: 30

      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest /tmp/AirAlert.ipa \
            --title "AirAlert — Latest Build" \
            --prerelease \
            --notes "## Installation

Installez AirAlert **sans compte Apple Developer** via AltStore ou Sideloadly.

### Via AltStore (recommandé)
1. Installez [AltStore](https://altstore.io) sur votre iPhone
2. Téléchargez \`AirAlert.ipa\` ci-dessous
3. AltStore → My Apps → **+** → sélectionnez l'IPA
4. ⚠️ Les apps signées avec un Apple ID gratuit expirent après **7 jours** — rouvrez AltStore pour re-signer

### Via Sideloadly (Windows / Mac)
1. Installez [Sideloadly](https://sideloadly.io)
2. Connectez votre iPhone, glissez-déposez l'IPA
3. Entrez votre Apple ID — aucun compte payant requis

### Via TrollStore (appareils compatibles uniquement)
Consultez [TrollStore](https://github.com/opa334/TrollStore) pour vérifier la compatibilité iOS.

---
*Build automatique depuis \`main\` — commit \`${{ github.sha }}\`*"
